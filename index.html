      el('results').innerHTML='<div class="card"><h2>'+esc(title||p.title)+'</h2>'+speakBar((title||p.title)+'. '+(p.extract||''),'documentaciÃģn')+'<div class="snippet">'+esc(p.extract||'Resumen no disponible.')+'</div>'+(p.url?'<p><a target="_blank" rel="noopener" href="'+esc(p.url)+'">Abrir fuente completa</a></p>':'')+'</div><div class="card"><h3>Puntos clave ejecutables</h3><div class="bullets">'+bullets.map(function(b,i){return '<div class="bullet" data-point="'+esc(b)+'" data-base="'+esc(title||p.title)+'"><b>'+(i+1)+'.</b> '+esc(b)+' <span class="mini">â tocar para ampliar</span></div>'}).join('')+'</div></div>'+sourceCard(title||query)
    })
  }).catch(function(e){fail(e&&e.message?e.message:'FallÃģ la documentaciÃģn breve.',query)})
}
function profundizar(base,point){
  setBusy(true);path.push('Profundizar');crumbs();el('results').innerHTML='';setStatus('Buscando documentaciÃģn ampliadaâĶ');
  var q=(base+' '+point).replace('Apartado:','');
  Promise.all([searchPages(q,6).catch(function(){return []}),wdSearch(q,4).catch(function(){return []})]).then(function(all){
    var found=all[0],wd=all[1];if(!found.length&& !wd.length){fail('No encontrÃĐ documentaciÃģn ampliada clara.',q);return}
    Promise.all(found.slice(0,6).map(function(x){return getExtract(x.title)})).then(function(pages){
      setBusy(false);setStatus('DocumentaciÃģn ampliada. Puedes seguir abriendo bloques.');
      var html=pages.map(function(p,i){return '<div class="card"><div class="row"><h2>'+(i+1)+'. '+esc(p.title)+'</h2><span class="tag">ampliar</span></div>'+speakBar(p.title+'. '+(p.extract||''),'bloque')+'<div class="snippet">'+esc(p.extract||'Fuente localizada online.')+'</div>'+(p.url?'<p><a target="_blank" rel="noopener" href="'+esc(p.url)+'">Ver fuente</a></p>':'')+'<button class="cmd" type="button" data-open="'+esc(p.title)+'" data-title="'+esc(p.title)+'"><span>Abrir como nuevo bloque</span><span>âš</span></button></div>'}).join('');
      if(wd.length){html+='<div class="card"><h3>Coincidencias en Wikidata</h3>'+wd.map(function(x){return '<div class="bullet"><b>'+esc(x.label)+'</b><br><span class="mini">'+esc(x.description||'Sin descripciÃģn')+'</span></div>'}).join('')+'</div>'}
      el('results').innerHTML=html+sourceCard(q)
    })
  }).catch(function(e){fail(e&&e.message?e.message:'FallÃģ la ampliaciÃģn online.',q)})
}
el('go').addEventListener('click',buscar);
el('q').addEventListener('keydown',function(e){if(e.key==='Enter')buscar()});
el('home').addEventListener('click',function(){stopSpeak();setBusy(false);path=[];crumbs();el('results').innerHTML='';setStatus('Escribe un tema para empezar.');el('q').focus()});
el('back').addEventListener('click',function(){stopSpeak();setBusy(false);path=[];crumbs();el('results').innerHTML='';setStatus('Escribe un tema para empezar.')});
el('results').addEventListener('click',function(e){var n=e.target;while(n&&n!==el('results')){if(n.getAttribute&&n.getAttribute('data-speak')){speak(n.getAttribute('data-speak'));return}if(n.getAttribute&&n.getAttribute('data-pause')){pauseResume(n);return}if(n.getAttribute&&n.getAttribute('data-open')){abrir(n.getAttribute('data-open'),n.getAttribute('data-title'));return}if(n.getAttribute&&n.getAttribute('data-point')){profundizar(n.getAttribute('data-base'),n.getAttribute('data-point'));return}n=n.parentNode}});
window.__explorador={buscar:buscar,abrir:abrir,profundizar:profundizar};
})();
