<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Explorador de temas</title>
<link rel="apple-touch-icon" sizes="180x180" href="./icono.png?v=3">
<link rel="icon" type="image/png" sizes="180x180" href="./icono.png?v=3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Explorador">
<meta name="theme-color" content="#0b1020">
<style>
:root{--bg:#0b1020;--panel:#111a2e;--panel2:#17233d;--txt:#e8eef8;--muted:#a7b4ca;--line:#2d3d61;--accent:#38bdf8;--ok:#22c55e;--bad:#fecaca;--warn:#fbbf24}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0b1020,#111c33);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh}.app{max-width:760px;margin:0 auto;padding:14px 12px 100px}.top{position:sticky;top:0;z-index:4;background:rgba(11,16,32,.97);backdrop-filter:blur(10px);padding:14px 0 12px;border-bottom:1px solid var(--line)}h1{font-size:25px;margin:0 0 4px}.version{display:inline-block;background:#1c2b49;color:var(--accent);border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;margin-bottom:8px}.sub{color:var(--muted);font-size:14px;line-height:1.35;margin-bottom:12px}.search{display:flex;gap:9px}input{flex:1;min-width:0;border:1px solid var(--line);background:#0b1326;color:var(--txt);border-radius:15px;padding:14px 13px;font-size:17px;outline:none}button{border:0;border-radius:15px;background:var(--accent);color:#06101e;font-weight:900;padding:13px 15px;font-size:16px}button:disabled{opacity:.55}button:active{transform:scale(.98)}button.secondary{background:#263758;color:var(--txt)}button.cmd{width:100%;margin-top:11px;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--accent)}.status{color:var(--muted);font-size:15px;line-height:1.35;margin:13px 0}.crumbs{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}.crumb{background:#1c2b49;color:var(--muted);padding:7px 10px;border-radius:999px;font-size:12px}.grid{display:grid;gap:11px}.card{background:rgba(17,26,46,.96);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.18)}.card h2{font-size:19px;margin:0 0 8px}.card h3{font-size:17px;margin:0 0 8px}.snippet{font-size:14px;line-height:1.42;color:var(--muted)}.src{font-size:12px;color:var(--muted);margin-top:8px}.row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.tag{font-size:12px;color:#06101e;background:var(--ok);border-radius:999px;padding:4px 8px;font-weight:900;white-space:nowrap}.tag.warn{background:var(--warn)}.bullets{display:grid;gap:9px;margin-top:12px}.bullet{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px;line-height:1.35}.bullet b{color:var(--accent)}.mini{font-size:12px;color:var(--muted)}.err{color:var(--bad);background:#4a1620;border:1px solid #7f1d1d;border-radius:14px;padding:12px;line-height:1.35}.note{color:#fee8a3;background:#3b2c10;border:1px solid #80620d;border-radius:14px;padding:12px;line-height:1.35}a{color:var(--accent);text-decoration:none}.links{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}.links a{background:#1c2b49;border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center;font-weight:800}.speakbar{display:flex;gap:8px;margin:8px 0 11px;flex-wrap:wrap}.speakbar button{font-size:17px;padding:13px 15px;border-radius:14px}.speakbar .stop{background:#263758;color:var(--txt)}.footer{position:fixed;left:0;right:0;bottom:0;background:rgba(11,16,32,.96);border-top:1px solid var(--line);padding:10px 12px env(safe-area-inset-bottom);display:flex;gap:8px;justify-content:center}.footer button{width:48%;max-width:230px}.small{font-size:12px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <h1>Explorador de temas</h1>
    <div class="version">V-3</div>
    <div class="sub">Busca online y crea comandos ejecutables. Fuentes: Wikipedia + Wikidata + accesos a bibliotecas y buscadores académicos.</div>
    <div class="search">
      <input id="q" placeholder="Ej.: Reyes Católicos" autocomplete="off">
      <button id="go" type="button">Buscar</button>
    </div>
  </div>
  <div id="crumbs" class="crumbs"></div>
  <div id="status" class="status">Escribe un tema para empezar.</div>
  <div id="results" class="grid"></div>
</div>
<div class="footer">
  <button class="secondary" id="back" type="button">Atrás</button>
  <button class="secondary" id="home" type="button">Inicio</button>
</div>
<script>
(function(){
'use strict';
var WIKI='https://es.wikipedia.org/w/api.php';
var WDATA='https://www.wikidata.org/w/api.php';
var path=[];
function el(id){return document.getElementById(id)}
function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function clean(s){return String(s||'').replace(/<[^>]+>/g,' ').replace(/\[[^\]]*\]/g,' ').replace(/\s+/g,' ').trim()}
function setStatus(t){el('status').textContent=t||''}
function setBusy(on){el('go').disabled=!!on;el('go').textContent=on?'Buscando…':'Buscar'}
function crumbs(){el('crumbs').innerHTML=path.slice(-4).map(function(x){return '<span class="crumb">'+esc(x)+'</span>'}).join('')}
function fail(msg,q){setBusy(false);setStatus('');el('results').innerHTML='<div class="err">'+esc(msg||'No se pudo consultar online.')+'<br><br>Si el archivo está abierto desde Archivos, prueba “Compartir → Abrir en Safari”.</div>'+(q?sourceCard(q):'')}
function jsonp(base,params,timeout){
  return new Promise(function(resolve,reject){
    var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*100000);
    var p=new URLSearchParams(params||{});p.set('format','json');p.set('callback',cb);
    var s=document.createElement('script');var done=false;
    var timer=setTimeout(function(){if(done)return;done=true;cleanup();reject(new Error('Tiempo agotado consultando fuente online.'))},timeout||10000);
    function cleanup(){clearTimeout(timer);try{delete window[cb]}catch(e){window[cb]=undefined}if(s&&s.parentNode)s.parentNode.removeChild(s)}
    window[cb]=function(data){if(done)return;done=true;cleanup();resolve(data)};
    s.onerror=function(){if(done)return;done=true;cleanup();reject(new Error('La fuente online no respondió.'))};
    s.src=base+'?'+p.toString();document.head.appendChild(s);
  })
}
function wiki(params){params=params||{};params.origin='*';return jsonp(WIKI,params,12000)}
function wikidata(params){params=params||{};params.origin='*';return jsonp(WDATA,params,12000)}
function searchPages(q,limit){return wiki({action:'query',list:'search',srsearch:q,srlimit:String(limit||7),srprop:'snippet'}).then(function(d){return d&&d.query&&d.query.search?d.query.search:[]})}
function getExtract(title){return wiki({action:'query',prop:'extracts|info',inprop:'url',explaintext:'1',exchars:'1800',titles:title,redirects:'1'}).then(function(d){var pages=d.query&&d.query.pages?d.query.pages:{};var k=Object.keys(pages)[0];var p=pages[k]||{};return {title:p.title||title,extract:clean(p.extract||''),url:p.fullurl||'',source:'Wikipedia'}})}
function getSections(title){return wiki({action:'parse',page:title,prop:'sections',redirects:'1'}).then(function(d){var arr=d.parse&&d.parse.sections?d.parse.sections:[];var bad=/^(véase también|referencias|bibliografía|enlaces externos|notas|fuentes)$/i;return arr.filter(function(s){return Number(s.toclevel)<=2&&s.line&&!bad.test(clean(s.line))}).map(function(s){return clean(s.line)}).slice(0,7)}).catch(function(){return []})}
function wdSearch(q,limit){return wikidata({action:'wbsearchentities',search:q,language:'es',uselang:'es',limit:String(limit||7)}).then(function(d){return d&&d.search?d.search:[]})}
function sourceLinks(q){var e=encodeURIComponent(q);return [
  ['Wikipedia','https://es.wikipedia.org/wiki/Special:Search?search='+e],
  ['Wikidata','https://www.wikidata.org/w/index.php?search='+e],
  ['RAH','https://dbe.rah.es/buscador?search='+e],
  ['BNE','https://datos.bne.es/busqueda.html?texto='+e],
  ['Dialnet','https://dialnet.unirioja.es/buscar/documentos?querysDismax.DOCUMENTAL_TODO='+e],
  ['Google Académico','https://scholar.google.com/scholar?q='+e]
]}
function sourceCard(q){return '<div class="card"><h3>Fuentes alternativas</h3><div class="snippet">Si una fuente falla, abre estas búsquedas externas.</div><div class="links">'+sourceLinks(q).map(function(x){return '<a target="_blank" rel="noopener" href="'+esc(x[1])+'">'+esc(x[0])+'</a>'}).join('')+'</div></div>'}
function speechText(t){return clean(String(t||'')).replace(/\s+/g,' ').trim()}
function speakBar(text,label){var t=speechText(text);if(!t)return '';return '<div class="speakbar"><button type="button" data-speak="'+esc(t)+'">🔊 Leer '+esc(label||'texto')+'</button><button type="button" class="stop" data-stop="1">■ Parar</button></div>'}
function speak(t){if(!('speechSynthesis' in window)){alert('Este navegador no permite lectura en voz alta.');return}window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(speechText(t));u.lang='es-ES';u.rate=0.95;u.pitch=1;window.speechSynthesis.speak(u)}
function stopSpeak(){if('speechSynthesis' in window)window.speechSynthesis.cancel()}
function sentenceBullets(text){var t=clean(text);if(!t)return[];var raw=t.split(/\.\s+/);var out=[];raw.forEach(function(x){x=clean(x);if(x.length>35){if(x.slice(-1)!=='.')x+='.';out.push(x.length>220?x.slice(0,217)+'…':x)}});return out.slice(0,6)}
function commandsFrom(base,sections,found,wd){var arr=[];sections.forEach(function(s){arr.push({title:s,kind:'apartado',query:base+' '+s,snippet:'Apartado principal encontrado en Wikipedia.'})});found.forEach(function(x){if(arr.length<7)arr.push({title:x.title,kind:'tema',query:x.title,snippet:clean(x.snippet)||'Resultado encontrado online.'})});wd.forEach(function(x){if(arr.length<7)arr.push({title:x.label,kind:'Wikidata',query:x.label,snippet:x.description||'Entidad encontrada en Wikidata.'})});var seen={};return arr.filter(function(x){var k=String(x.title).toLowerCase();if(!k||seen[k])return false;seen[k]=1;return true}).slice(0,7)}
function buscar(){
  var q=clean(el('q').value);if(!q){setStatus('Escribe un tema para empezar.');return}
  setBusy(true);path=[q];crumbs();el('results').innerHTML='';setStatus('Botón recibido. Consultando fuentes online…');
  Promise.all([searchPages(q,7).catch(function(){return []}),wdSearch(q,7).catch(function(){return []})]).then(function(all){
    var found=all[0],wd=all[1];
    if(!found.length && !wd.length){fail('No encontré datos directos en Wikipedia ni Wikidata.',q);return}
    var mainTitle=found.length?found[0].title:(wd[0].label||q);
    Promise.all([found.length?getExtract(mainTitle).catch(function(){return {title:mainTitle,extract:'',url:'',source:'Wikipedia'}}):Promise.resolve({title:mainTitle,extract:wd[0].description||'',url:'',source:'Wikidata'}), found.length?getSections(mainTitle):Promise.resolve([])]).then(function(res){
      var summary=res[0],sections=res[1];var commands=commandsFrom(summary.title||mainTitle,sections,found,wd);
      setBusy(false);setStatus('Toca un comando principal para abrir documentación breve.');
      el('results').innerHTML='<div class="card"><h2>Tema base: '+esc(summary.title||q)+'</h2>'+speakBar((summary.title||q)+'. '+(summary.extract||''),'tema base')+'<div class="snippet">'+esc(summary.extract||'Fuente localizada online.')+'</div>'+'<div class="src">Fuente principal: '+esc(summary.source||'online')+'</div>'+(summary.url?'<p><a target="_blank" rel="noopener" href="'+esc(summary.url)+'">Abrir fuente base</a></p>':'')+'</div>'+commands.map(function(c,i){return '<div class="card"><div class="row"><h2>'+(i+1)+'. '+esc(c.title)+'</h2><span class="tag">'+esc(c.kind)+'</span></div>'+speakBar(c.title+'. '+c.snippet,'resumen')+'<div class="snippet">'+esc(c.snippet)+'</div><div class="src">Comando ejecutable online</div><button class="cmd" type="button" data-open="'+esc(c.query)+'" data-title="'+esc(c.title)+'"><span>Abrir documentación</span><span>›</span></button></div>'}).join('')+sourceCard(q)
    }).catch(function(e){fail(e&&e.message?e.message:'Falló la preparación del tema.',q)})
  }).catch(function(e){fail(e&&e.message?e.message:'Falló la búsqueda online.',q)})
}
function abrir(query,title){
  setBusy(true);path.push(title||query);crumbs();el('results').innerHTML='';setStatus('Preparando 5–6 puntos clave…');
  searchPages(query,4).catch(function(){return []}).then(function(found){
    var target=found.length?found[0].title:query;
    return Promise.all([getExtract(target).catch(function(){return {title:target,extract:'Resumen no disponible en Wikipedia.',url:'',source:'Wikipedia'}}),getSections(target)]).then(function(res){
      var p=res[0],sections=res[1];var bullets=sections.length>=5?sections.slice(0,6).map(function(s){return 'Apartado: '+s}):sentenceBullets(p.extract);
      if(!bullets.length)bullets=['Contexto general','Personajes principales','Hechos clave','Cronología básica','Consecuencias','Fuentes para ampliar'];
      setBusy(false);setStatus('Toca cualquier punto para profundizar más.');
      el('results').innerHTML='<div class="card"><h2>'+esc(title||p.title)+'</h2>'+speakBar((title||p.title)+'. '+(p.extract||''),'documentación')+'<div class="snippet">'+esc(p.extract||'Resumen no disponible.')+'</div>'+(p.url?'<p><a target="_blank" rel="noopener" href="'+esc(p.url)+'">Abrir fuente completa</a></p>':'')+'</div><div class="card"><h3>Puntos clave ejecutables</h3><div class="bullets">'+bullets.map(function(b,i){return '<div class="bullet" data-point="'+esc(b)+'" data-base="'+esc(title||p.title)+'"><b>'+(i+1)+'.</b> '+esc(b)+' <span class="mini">— tocar para ampliar</span></div>'}).join('')+'</div></div>'+sourceCard(title||query)
    })
  }).catch(function(e){fail(e&&e.message?e.message:'Falló la documentación breve.',query)})
}
function profundizar(base,point){
  setBusy(true);path.push('Profundizar');crumbs();el('results').innerHTML='';setStatus('Buscando documentación ampliada…');
  var q=(base+' '+point).replace('Apartado:','');
  Promise.all([searchPages(q,6).catch(function(){return []}),wdSearch(q,4).catch(function(){return []})]).then(function(all){
    var found=all[0],wd=all[1];if(!found.length&& !wd.length){fail('No encontré documentación ampliada clara.',q);return}
    Promise.all(found.slice(0,6).map(function(x){return getExtract(x.title)})).then(function(pages){
      setBusy(false);setStatus('Documentación ampliada. Puedes seguir abriendo bloques.');
      var html=pages.map(function(p,i){return '<div class="card"><div class="row"><h2>'+(i+1)+'. '+esc(p.title)+'</h2><span class="tag">ampliar</span></div>'+speakBar(p.title+'. '+(p.extract||''),'bloque')+'<div class="snippet">'+esc(p.extract||'Fuente localizada online.')+'</div>'+(p.url?'<p><a target="_blank" rel="noopener" href="'+esc(p.url)+'">Ver fuente</a></p>':'')+'<button class="cmd" type="button" data-open="'+esc(p.title)+'" data-title="'+esc(p.title)+'"><span>Abrir como nuevo bloque</span><span>›</span></button></div>'}).join('');
      if(wd.length){html+='<div class="card"><h3>Coincidencias en Wikidata</h3>'+wd.map(function(x){return '<div class="bullet"><b>'+esc(x.label)+'</b><br><span class="mini">'+esc(x.description||'Sin descripción')+'</span></div>'}).join('')+'</div>'}
      el('results').innerHTML=html+sourceCard(q)
    })
  }).catch(function(e){fail(e&&e.message?e.message:'Falló la ampliación online.',q)})
}
el('go').addEventListener('click',buscar);
el('q').addEventListener('keydown',function(e){if(e.key==='Enter')buscar()});
el('home').addEventListener('click',function(){stopSpeak();setBusy(false);path=[];crumbs();el('results').innerHTML='';setStatus('Escribe un tema para empezar.');el('q').focus()});
el('back').addEventListener('click',function(){stopSpeak();setBusy(false);path=[];crumbs();el('results').innerHTML='';setStatus('Escribe un tema para empezar.')});
el('results').addEventListener('click',function(e){var n=e.target;while(n&&n!==el('results')){if(n.getAttribute&&n.getAttribute('data-speak')){speak(n.getAttribute('data-speak'));return}if(n.getAttribute&&n.getAttribute('data-stop')){stopSpeak();return}if(n.getAttribute&&n.getAttribute('data-open')){abrir(n.getAttribute('data-open'),n.getAttribute('data-title'));return}if(n.getAttribute&&n.getAttribute('data-point')){profundizar(n.getAttribute('data-base'),n.getAttribute('data-point'));return}n=n.parentNode}});
window.__explorador={buscar:buscar,abrir:abrir,profundizar:profundizar};
})();
</script>
</body>
</html>
